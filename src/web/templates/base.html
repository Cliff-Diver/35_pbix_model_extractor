<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PBIX Model Extractor{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #f5f7fb;
            --page-max-width: 960px;
        }
        body > header, body > main, body > footer {
            max-width: var(--page-max-width);
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        body > header {
            background: #fff;
            padding-top: 0.7rem;
            padding-bottom: 0.7rem;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        body > main { padding-top: 1.5rem; padding-bottom: 2rem; }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <header>
        <nav style="display:flex; align-items:center; justify-content:space-between; gap:1rem;">
            <a href="/" style="font-weight:700; font-size:1rem; text-decoration:none; color:inherit;">
                📈&nbsp;PBIX Extractor
            </a>
            <div style="display:flex; gap:1.25rem; font-size:0.88rem;">
                <a href="/">Upload</a>
                {% block nav_extra %}{% endblock %}
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="padding-top:0.75rem; padding-bottom:1rem; border-top:1px solid #e5e7eb; margin-top:2rem;">
        <small style="color:#9ca3af;">PBIX Model Extractor v0.2.0</small>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
