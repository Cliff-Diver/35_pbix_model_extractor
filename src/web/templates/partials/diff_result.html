{% for result in results %}
<article class="diff-result-card">
    <header>
        <h3>{{ result.query_name }}</h3>
        {% if result.has_changes %}
            <span class="badge badge-changed">Změněno</span>
        {% else %}
            <span class="badge badge-unchanged">Beze změn</span>
        {% endif %}
    </header>

    <div class="diff-view diff-side-by-side" data-mode="side-by-side">
        {{ result.diff_html_side_by_side | safe }}
    </div>

    <div class="diff-view diff-unified" data-mode="unified" style="display: none;">
        {{ result.diff_html_unified | safe }}
    </div>
</article>
{% endfor %}
